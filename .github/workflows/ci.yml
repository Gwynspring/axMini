name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Dependencies
        run: sudo apt-get install -y cmake g++

      - name: Build
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -B build
          cmake --build build

      - name: Test Lexer
        run: ./build/test/test_lexer
            
      - name: Test Parser
        run: ./build/test/test_parser

      - name: Test Motor
        run: ./build/test/test_motor

      - name: Test Valve
        run: ./build/test/test_valve
